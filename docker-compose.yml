services:
  api:
    image: node:20
    working_dir: /app
    volumes:
      - ./server:/app
      - ./server/db.sqlite:/app/db.sqlite
      - /app/node_modules
    ports:
      - '4000:4000'
    environment:
      - DB_FILE=/app/db.sqlite
      - JWT_SECRET=dev-secret
      - CORS_ORIGIN=http://localhost:5173,http://127.0.0.1:5173
    command: sh -c "npm install && npm start"

  web:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://api:4000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
